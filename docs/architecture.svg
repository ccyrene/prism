<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 470" width="1040" height="470"
     font-family="'Inter',system-ui,sans-serif" role="img"
     aria-label="Flow from the Kubernetes API through prismd into one shared, read-only eBPF map (prism_identity, the bus) read O(1) by three consumers: a sched_ext scheduler, a tc/net-policy program, and a tracer.">
  <style>
    .svg-label{font-family:'Inter',system-ui,sans-serif;}
    .svg-mono{font-family:'JetBrains Mono',ui-monospace,'SFMono-Regular',monospace;}
  </style>
  <defs>
    <marker id="arrA" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#8ba2bc"/>
    </marker>
    <marker id="arrAg" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#00d68f"/>
    </marker>
    <marker id="arrAb" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#326ce5"/>
    </marker>
  </defs>

  <!-- background (self-contained: readable on GitHub light AND dark themes) -->
  <rect x="0" y="0" width="1040" height="470" fill="#0a1929"/>

  <!-- 1. Kubernetes API -->
  <rect x="20" y="150" width="190" height="120" rx="12" fill="rgba(50,108,229,.12)" stroke="#326ce5" stroke-width="1.5"/>
  <text x="115" y="183" text-anchor="middle" class="svg-label" fill="#cfe0ff" font-size="15" font-weight="700">Kubernetes API</text>
  <text x="115" y="210" text-anchor="middle" class="svg-label" fill="#d6e2f0" font-size="12.5">pods + labels</text>
  <text x="115" y="232" text-anchor="middle" class="svg-mono" fill="#8ba2bc" font-size="11">app=web</text>
  <text x="115" y="250" text-anchor="middle" class="svg-mono" fill="#8ba2bc" font-size="11">tier=frontend</text>

  <!-- watch arrow -->
  <line x1="212" y1="210" x2="282" y2="210" stroke="#8ba2bc" stroke-width="2" marker-end="url(#arrA)"/>
  <text x="247" y="200" text-anchor="middle" class="svg-mono" fill="#8ba2bc" font-size="11">watch</text>

  <!-- 2. prismd -->
  <rect x="284" y="120" width="206" height="180" rx="12" fill="rgba(0,214,143,.10)" stroke="#00d68f" stroke-width="1.5"/>
  <text x="387" y="148" text-anchor="middle" class="svg-mono" fill="#00d68f" font-size="15" font-weight="700">prismd</text>
  <text x="387" y="166" text-anchor="middle" class="svg-label" fill="#8ba2bc" font-size="11">per-node daemon</text>
  <line x1="300" y1="178" x2="474" y2="178" stroke="rgba(139,162,188,.25)" stroke-width="1"/>
  <text x="306" y="205" class="svg-label" fill="#d6e2f0" font-size="12.5"><tspan fill="#00d68f" font-weight="700">1</tspan>  watch pods</text>
  <text x="306" y="232" class="svg-label" fill="#d6e2f0" font-size="12.5"><tspan fill="#00d68f" font-weight="700">2</tspan>  derive identity</text>
  <text x="306" y="259" class="svg-label" fill="#d6e2f0" font-size="12.5"><tspan fill="#00d68f" font-weight="700">3</tspan>  publish to map</text>
  <text x="387" y="286" text-anchor="middle" class="svg-mono" fill="#8ba2bc" font-size="9.5">~13 ns resolve · ~0.7 µs propagate</text>

  <!-- writes arrow -->
  <line x1="492" y1="210" x2="562" y2="210" stroke="#00d68f" stroke-width="2" marker-end="url(#arrAg)"/>
  <text x="527" y="200" text-anchor="middle" class="svg-mono" fill="#00d68f" font-size="11">writes</text>

  <!-- 3. shared eBPF map (the bus) -->
  <rect x="564" y="120" width="222" height="180" rx="12" fill="rgba(255,181,71,.10)" stroke="#ffb547" stroke-width="2"/>
  <text x="675" y="147" text-anchor="middle" class="svg-mono" fill="#ffb547" font-size="14.5" font-weight="700">prism_identity</text>
  <text x="675" y="166" text-anchor="middle" class="svg-label" fill="#d6e2f0" font-size="11.5">ONE shared, pinned eBPF map</text>
  <rect x="582" y="182" width="186" height="58" rx="8" fill="rgba(10,25,41,.6)" stroke="rgba(255,181,71,.4)" stroke-width="1"/>
  <text x="675" y="204" text-anchor="middle" class="svg-mono" fill="#8ba2bc" font-size="11">key = cgroup-id</text>
  <text x="675" y="225" text-anchor="middle" class="svg-mono" fill="#d6e2f0" font-size="11">val = 24-bit identity</text>
  <text x="675" y="270" text-anchor="middle" class="svg-label" fill="#ffb547" font-size="13.5" font-weight="700">= the bus</text>
  <text x="675" y="288" text-anchor="middle" class="svg-label" fill="#8ba2bc" font-size="11">บัสกลางของ identity</text>

  <!-- O(1) read arrows to three consumers -->
  <line x1="788" y1="170" x2="852" y2="78"  stroke="#326ce5" stroke-width="2" marker-end="url(#arrAb)"/>
  <line x1="788" y1="210" x2="852" y2="210" stroke="#326ce5" stroke-width="2" marker-end="url(#arrAb)"/>
  <line x1="788" y1="250" x2="852" y2="342" stroke="#326ce5" stroke-width="2" marker-end="url(#arrAb)"/>
  <text x="812" y="120" text-anchor="middle" class="svg-mono" fill="#326ce5" font-size="11" transform="rotate(-32 812 120)">O(1) read</text>

  <!-- consumer: sched_ext -->
  <rect x="854" y="44" width="166" height="62" rx="10" fill="rgba(19,44,68,.7)" stroke="#326ce5" stroke-width="1.3"/>
  <text x="937" y="70" text-anchor="middle" class="svg-mono" fill="#cfe0ff" font-size="13" font-weight="700">sched_ext</text>
  <text x="937" y="90" text-anchor="middle" class="svg-mono" fill="#00d68f" font-size="10">flag: SCHED_MANAGED</text>

  <!-- consumer: tc / net policy -->
  <rect x="854" y="179" width="166" height="62" rx="10" fill="rgba(19,44,68,.7)" stroke="#326ce5" stroke-width="1.3"/>
  <text x="937" y="205" text-anchor="middle" class="svg-mono" fill="#cfe0ff" font-size="13" font-weight="700">tc / net policy</text>
  <text x="937" y="225" text-anchor="middle" class="svg-mono" fill="#00d68f" font-size="10">flag: NET_POLICY</text>

  <!-- consumer: tracing / observe -->
  <rect x="854" y="314" width="166" height="62" rx="10" fill="rgba(19,44,68,.7)" stroke="#326ce5" stroke-width="1.3"/>
  <text x="937" y="340" text-anchor="middle" class="svg-mono" fill="#cfe0ff" font-size="13" font-weight="700">tracing / observe</text>
  <text x="937" y="360" text-anchor="middle" class="svg-mono" fill="#00d68f" font-size="10">flag: OBSERVED</text>

  <!-- Linux kernel substrate -->
  <rect x="564" y="402" width="456" height="46" rx="10" fill="rgba(139,162,188,.08)" stroke="rgba(139,162,188,.35)" stroke-width="1.2"/>
  <text x="792" y="430" text-anchor="middle" class="svg-label" fill="#8ba2bc" font-size="13" font-weight="600">Linux kernel — all consumers run here</text>
  <!-- consumers down into kernel -->
  <line x1="937" y1="106" x2="937" y2="402" stroke="rgba(139,162,188,.3)" stroke-width="1.2" stroke-dasharray="3 4"/>
  <line x1="937" y1="241" x2="937" y2="402" stroke="rgba(139,162,188,.3)" stroke-width="1.2" stroke-dasharray="3 4"/>
</svg>
